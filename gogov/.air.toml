root = "."
tmp_dir = ".air"

[build]
  cmd = "go build -o ./.air/gogov ./cmd/gogov"
  bin = "./.air/gogov serve"
  include_ext = ["go", "yaml", "yml"]
  exclude_dir = [".air", ".git", ".governance", "node_modules"]
  exclude_regex = ["_test\\.go"]
  stop_on_error = true

[log]
  time = true

[misc]
  clean_on_exit = true
